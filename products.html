<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>STYLE-MART Products</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Audiowide&family=Bruno+Ace&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>

    <!-- CSS -->
    <link rel="stylesheet" href="design.css">
</head>

<body onload="checkLogin(); showUserName();">

<main>

    <!-- NAVBAR -->
    <nav>
        <h2>STYLE-MART</h2>
        <div class="part2">
            <a href="products.html">Products</a>
            <a href="cart.html">Cart</a>
            <a href="login.html">Login</a>
            <div id="user-name"></div>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <section>
        <div class="hero-text1">
            <h1>Latest</h1>
        </div>

        <div class="hero-text2">
            <h1>Collection</h1>
            <p>Explore premium fashion products<br>curated for modern trends.</p>
        </div>
    </section>

    <!-- PRODUCTS -->
    <div class="products">

        <!-- PRODUCT 1 -->
        <div class="product-box">
            <img src="https://images.unsplash.com/photo-1600269452121-4f2416e55c28?w=600">
            <div class="product-info">
                <h2>Sneaker</h2>
                <p>₹1999</p>
                <button onclick="addToCart('Sneaker', 1999)">Add to Cart</button>
            </div>
        </div>

        <!-- PRODUCT 2 -->
        <div class="product-box">
            <img src="https://plus.unsplash.com/premium_photo-1673356302067-aac3b545a362?w=600">
            <div class="product-info">
                <h2>T-Shirt</h2>
                <p>₹999</p>
                <button onclick="addToCart('T-Shirt', 999)">Add to Cart</button>
            </div>
        </div>

        <!-- PRODUCT 3 -->
        <div class="product-box">
            <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=800">
            <div class="product-info">
                <h2>Jeans</h2>
                <p>₹899</p>
                <button onclick="addToCart('Jeans', 899)">Add to Cart</button>
            </div>
        </div>

        <!-- PRODUCT 4 -->
        <div class="product-box">
            <img src="https://images.unsplash.com/photo-1521223890158-f9f7c3d5d504?w=600">
            <div class="product-info">
                <h2>Jacket</h2>
                <p>₹2499</p>
                <button onclick="addToCart('Jacket', 2499)">Add to Cart</button>
            </div>
        </div>

        <!-- PRODUCT 5 -->
        <div class="product-box">
            <img src="https://images.unsplash.com/photo-1677769235174-a5fddc6a2ebd?w=600">
            <div class="product-info">
                <h2>Wristwatch</h2>
                <p>₹1599</p>
                <button onclick="addToCart('Wristwatch', 1599)">Add to Cart</button>
            </div>
        </div>

        <!-- PRODUCT 6 -->
        <div class="product-box">
            <img src="https://plus.unsplash.com/premium_photo-1664110691050-4cd1fb8e3aa4?w=600">
            <div class="product-info">
                <h2>Sunglasses</h2>
                <p>₹699</p>
                <button onclick="addToCart('Sunglasses', 699)">Add to Cart</button>
            </div>
        </div>

    </div>

</main>

<script src="script.js"></script>
